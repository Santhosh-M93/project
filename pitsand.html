<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="search.js"></script>
    <title>Ordinary Portland Cement - All Grades</title>
    <style>
        :root {
            --brown: #421F16;
            --cream: #F3ECDC;
            --accent: #8B4513;
            --accent-hover: #A0522D;
            --muted: #7a6c66;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Inter, system-ui, Arial;
            background: #F3ECDC;
            color: var(--brown);
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: #421F16;
            color: #F3ECDC;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 12px rgba(66, 31, 22, 0.3);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #F3ECDC;
        }

        .logo-image {
            width: 180px;
            height: 50px;
            object-fit: contain;
            border-radius: 15px;
        }

        .search-container {
            flex: 1;
            max-width: 600px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 3rem 0.75rem 1rem;
            border: 2px solid #F3ECDC;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            background: #F3ECDC;
            color: #421F16;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: #8B4513;
            box-shadow: 0 0 0 3px rgba(139, 69, 19, 0.1);
        }

        .search-btn {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            color: #421F16;
        }

        .search-btn svg {
            width: 20px;
            height: 20px;
        }

        .header-icons {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .become-seller-btn {
            background: #8B4513;
            color: #F3ECDC;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .become-seller-btn:hover {
            background: #A0522D;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 69, 19, 0.3);
        }

        .become-seller-btn svg {
            width: 18px;
            height: 18px;
        }

        .icon-btn {
            background: rgba(243, 236, 220, 0.2);
            border: 2px solid #F3ECDC;
            color: #F3ECDC;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
        }

        .icon-btn:hover {
            background: rgba(243, 236, 220, 0.3);
            transform: translateY(-2px);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #D2691E;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid #421F16;
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .page-title {
            font-size: 2rem;
            color: var(--brown);
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: var(--muted);
            margin-bottom: 2rem;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2.5rem 2rem;
            perspective: 1000px;
        }

        /* Update .product-card - Premium Top Deals Style */
        /* ===============================================
   UPDATED PRODUCT CARD DESIGN
   =============================================== */

        /* Replace .product-card */
        .product-card {
            background: white;
            border-radius: 16px;
            padding: 0;
            box-shadow: 0 4px 12px rgba(66, 31, 22, 0.08);
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            overflow: hidden;
            border: 1px solid #F3ECDC;
            position: relative;
        }

        .product-card::after {
            display: none;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 28px rgba(66, 31, 22, 0.15);
            border-color: #D4AF37;
        }

        /* Replace .product-image-container */
        .product-image-container {
            position: relative;
            width: 100%;
            height: 240px;
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #faf8f6 0%, #F3ECDC 100%);
        }

        .product-image-container::before {
            display: none;
        }

        /* Replace .product-image */
        .product-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 24px;
            transition: transform 0.4s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.08);
        }

        /* Replace .discount-badge */
        .discount-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: linear-gradient(135deg, #2C1810 0%, #421F16 100%);
            color: #FFD700;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            z-index: 3;
            box-shadow: 0 4px 12px rgba(44, 24, 16, 0.4);
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            animation: none;
        }

        .product-card:hover .discount-badge {
            transform: scale(1.05);
            background: linear-gradient(135deg, #421F16 0%, #5a2a1d 100%);
        }

        /* Replace .product-content */
        .product-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            background: linear-gradient(135deg, #2C1810 0%, #421F16 100%);
            border-top: 2px solid #D4AF37;
        }

        .product-content::before {
            display: none;
        }

        /* Replace .product-name */
        .product-name {
            font-size: 1.05rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FFD700 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0 0 14px 0;
            line-height: 1.5;
            letter-spacing: 1px;
            text-transform: uppercase;
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            position: relative;
            padding: 16px 18px;
            filter: drop-shadow(0 2px 8px rgba(255, 215, 0, 0.3));
            animation: gradientShine 3s ease infinite;
        }

        @keyframes gradientShine {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        /* Glowing underline effect */
        .product-name::before {
            content: '';
            position: absolute;
            bottom: 8px;
            left: 18px;
            right: 18px;
            height: 2px;
            background: linear-gradient(90deg,
                    transparent 0%,
                    #FFD700 20%,
                    #FFA500 50%,
                    #FFD700 80%,
                    transparent 100%);
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.6);
        }

        /* Corner accents */
        .product-name::after {
            content: '⟨⟩';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            color: #FFD700;
            opacity: 0.5;
            letter-spacing: -8px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* Hover effects */
        .product-card:hover .product-name {
            animation: gradientShine 1.5s ease infinite, float 0.6s ease-in-out;
            filter: drop-shadow(0 4px 16px rgba(255, 215, 0, 0.6));
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-3px);
            }
        }

        .product-card:hover .product-name::before {
            background: linear-gradient(90deg,
                    transparent 0%,
                    #FFD700 10%,
                    #FFA500 50%,
                    #FFD700 90%,
                    transparent 100%);
            box-shadow: 0 0 16px rgba(255, 215, 0, 0.9);
            animation: slideGlow 1s ease-in-out infinite;
        }

        @keyframes slideGlow {
            0% {
                transform: translateX(-10px);
                opacity: 0.6;
            }

            50% {
                transform: translateX(0);
                opacity: 1;
            }

            100% {
                transform: translateX(10px);
                opacity: 0.6;
            }
        }

        .product-card:hover .product-name::after {
            opacity: 1;
            animation: bracketPulse 1s ease-in-out infinite;
            color: #FFA500;
        }

        @keyframes bracketPulse {

            0%,
            100% {
                letter-spacing: -8px;
                transform: translateY(-50%) scale(1);
            }

            50% {
                letter-spacing: -5px;
                transform: translateY(-50%) scale(1.1);
            }
        }

        /* Replace .product-desc */
        .product-desc {
            color: #F3ECDC;
            font-size: 0.875rem;
            line-height: 1.5;
            margin-bottom: 12px;
            font-weight: 400;
            flex-grow: 1;
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            line-clamp: 2;
        }

        /* Replace .price-container */
        .price-container {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0 0 0;
            margin-top: auto;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
        }

        /* Replace .discounted-price */
        .discounted-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #FFD700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            animation: none;
        }

        .discounted-price::before {
            content: '₹';
            font-size: 1rem;
            vertical-align: baseline;
            margin-right: 2px;
        }

        /* Replace .original-price */
        .original-price {
            color: rgba(243, 236, 220, 0.6);
            font-size: 0.9rem;
            font-weight: 400;
            text-decoration: line-through;
            text-decoration-color: rgba(243, 236, 220, 0.6);
            text-decoration-thickness: 1.5px;
        }

        /* Updated Responsive */
        @media (max-width: 768px) {
            .product-card {
                border-radius: 14px;
            }

            .product-image-container {
                height: 200px;
            }

            .product-image {
                padding: 20px;
            }

            .product-content {
                padding: 16px;
            }

            .product-name {
                font-size: 0.95rem;
                margin-bottom: 6px;
            }

            .product-desc {
                font-size: 0.85rem;
                margin-bottom: 10px;
            }

            .price-container {
                padding: 10px 0 0 0;
            }

            .discounted-price {
                font-size: 1.35rem;
            }

            .original-price {
                font-size: 0.85rem;
            }

            .discount-badge {
                padding: 5px 12px;
                font-size: 0.7rem;
                top: 14px;
                left: 14px;
            }
        }

        @media (max-width: 480px) {
            .product-card {
                border-radius: 12px;
            }

            .product-image-container {
                height: 180px;
            }

            .product-image {
                padding: 16px;
            }

            .product-content {
                padding: 14px;
            }

            .product-name {
                font-size: 0.9rem;
                margin-bottom: 6px;
            }

            .product-desc {
                font-size: 0.8rem;
                margin-bottom: 8px;
            }

            .price-container {
                gap: 10px;
                padding: 8px 0 0 0;
            }

            .discounted-price {
                font-size: 1.25rem;
            }

            .original-price {
                font-size: 0.8rem;
            }

            .discount-badge {
                top: 12px;
                left: 12px;
                padding: 4px 10px;
                font-size: 0.68rem;
            }
        }

        @media (max-width: 360px) {
            .product-image-container {
                height: 160px;
            }

            .product-image {
                padding: 14px;
            }

            .product-content {
                padding: 12px;
            }

            .product-name {
                font-size: 0.85rem;
            }

            .product-desc {
                font-size: 0.75rem;
            }

            .price-container {
                padding: 6px 0 0 0;
            }

            .discounted-price {
                font-size: 1.15rem;
            }

            .original-price {
                font-size: 0.75rem;
            }

            .discount-badge {
                padding: 3px 8px;
                font-size: 0.65rem;
            }
        }


        /* Responsive Design */
        @media (max-width: 1024px) {
            .logo-image {
                width: 150px;
                height: 42px;
                border-radius: 12px;
                /* 30% of 42px = 12.6px, rounded to 12px */
            }

            .products-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 1.25rem;
            }

            .page-title {
                font-size: 1.75rem;
            }
        }

        @media (max-width: 768px) {
            .header-container {
                gap: 0.75rem;
            }

            .search-container {
                order: 3;
                width: 100%;
                max-width: 100%;
            }

            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }

            .page-title {
                font-size: 1.5rem;
            }


        }

        @media (max-width: 480px) {
            .header {
                padding: 0.75rem 0;
            }

            .header-container {
                gap: 0.5rem;
                padding: 0 0.5rem;
            }

            .logo-image {
                width: 100px;
                height: 30px;
                border-radius: 9px;
            }

            .become-seller-btn span {
                display: none;
            }

            .become-seller-btn {
                padding: 0.5rem;
                width: 40px;
                height: 40px;
                justify-content: center;
                gap: 0;
            }

            .icon-btn {
                width: 36px;
                height: 36px;
            }

            .icon-btn svg {
                width: 18px;
                height: 18px;
            }

            .search-input {
                padding: 0.65rem 2.5rem 0.65rem 0.75rem;
                font-size: 0.9rem;
            }

            .products-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .header-container {
                flex-wrap: wrap;
            }

            .logo {
                font-size: 1.2rem;
            }

            .page-title {
                font-size: 1.3rem;
            }


        }

        @media (max-width: 360px) {
            .logo-image {
                width: 80px;
                height: 24px;
                border-radius: 7px;
            }

            .header-container {
                padding: 0 0.35rem;
            }

            .icon-btn {
                width: 32px;
                height: 32px;
            }

            .become-seller-btn {
                width: 32px;
                height: 32px;
                padding: 0.35rem;
            }

            .cart-badge {
                width: 16px;
                height: 16px;
                font-size: 0.65rem;
                top: -6px;
                right: -6px;
            }

            .search-input {
                font-size: 0.85rem;
                padding: 0.55rem 2.25rem 0.55rem 0.65rem;
            }

            .container {
                padding: 0 0.5rem;
            }

            .product-image-container {
                height: 140px;
            }

            .page-title {
                font-size: 1.2rem;
            }


        }
    </style>

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <a href="homepage.html" class="logo">
                <!-- Replace with your logo filename -->
                <img src="WhatsApp Image 2025-12-08 at 7.55.57 PM.jpeg" alt="Logo" class="logo-image">
            </a>

            <div class="search-container">
                <input type="text" class="search-input" placeholder="Search for products..." id="searchInput">
                <button class="search-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
            </div>

            <div class="header-icons">
                <button class="become-seller-btn" onclick="window.location.href='become-seller.html'">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 7h-9"></path>
                        <path d="M14 17H5"></path>
                        <circle cx="17" cy="17" r="3"></circle>
                        <circle cx="7" cy="7" r="3"></circle>
                    </svg>
                    <span>Become Seller</span>
                </button>
                <a href="account.html" class="icon-btn" onclick="handleProfileClick(event)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </a>
                <a href="cart.html" class="icon-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-badge">0</span>
                </a>

            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <h1 class="page-title">Pit Sand</h1>
        <p class="page-subtitle">Premium quality Sand for all construction needs</p>

        <div class="products-grid" id="productsGrid"></div>
    </main>

    <script>
        // ============================================
        // USER-SPECIFIC CART HELPER FUNCTIONS
        // ============================================

        function getCurrentUserId() {
            const userData = JSON.parse(localStorage.getItem('userData'));
            return userData ? userData.id : null;
        }

        function getUserCart(userId) {
            if (!userId) return [];

            const allCarts = JSON.parse(localStorage.getItem('userCarts')) || {};
            return allCarts[userId] || [];
        }

        function updateCartBadge() {
            const userId = getCurrentUserId();
            if (!userId) {
                const badge = document.querySelector(".cart-badge");
                if (badge) badge.textContent = '0';
                return;
            }

            const cart = getUserCart(userId);
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const badge = document.querySelector(".cart-badge");
            if (badge) badge.textContent = totalItems;
        }

        const opcProducts = [
            {
                id: 1,
                name: 'Fine Pit Sand',
                desc: 'Ideal for general construction.',
                image: 'https://miaoda-site-img.s3cdn.medo.dev/images/ce78525f-1e48-462f-8199-dbbf2fa29479.jpg',
                originalPrice: 399,
                discountedPrice: 359,
                discount: 10,
                link: 'finepitsand.html'
            },
            {
                id: 2,
                name: 'Medium Pit Sand',
                desc: 'Versatile cement.',
                image: 'https://miaoda-site-img.s3cdn.medo.dev/images/681b8a95-3acd-439a-9b0d-896e7a3ec867.jpg',
                originalPrice: 450,
                discountedPrice: 405,
                discount: 10,
                link: 'mediumpitsand.html'
            },
            {
                id: 3,
                name: 'Coarse Pit Sand',
                desc: 'High-strength cement.',
                image: 'https://miaoda-site-img.s3cdn.medo.dev/images/ce78525f-1e48-462f-8199-dbbf2fa29479.jpg',
                originalPrice: 499,
                discountedPrice: 449,
                discount: 10,
                link: 'coarsepitsand.html'
            },
            {
                id: 4,
                name: 'Washed Pit Sand',
                desc: 'Budget-friendly.',
                image: 'https://miaoda-site-img.s3cdn.medo.dev/images/681b8a95-3acd-439a-9b0d-896e7a3ec867.jpg',
                originalPrice: 370,
                discountedPrice: 333,
                discount: 10,
                link: 'washedpitsand.html'
            },
            {
                id: 5,
                name: 'Unwashed Pit Sand',
                desc: 'Enhanced formula.',
                image: 'https://miaoda-site-img.s3cdn.medo.dev/images/ce78525f-1e48-462f-8199-dbbf2fa29479.jpg',
                originalPrice: 480,
                discountedPrice: 432,
                discount: 10,
                link: 'unwashedpitsand.html'
            },
            
        ];

        function formatPrice(price) {
            return '₹' + price.toLocaleString('en-IN');
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = opcProducts.map(product => `
            <div class="product-card" onclick="handleProductClick('${product.link || ''}', ${product.id})">
                <div class="product-image-container">
                    <img src="${product.image}" alt="${product.name}" class="product-image">
                    <div class="discount-badge">${product.discount}% OFF</div>
                </div>
                
                <div class="product-content">
                    <h3 class="product-name">${product.name}</h3>
                    <p class="product-desc">${product.desc}</p>

                    <div class="price-container">
                        <span class="original-price">${formatPrice(product.originalPrice)}</span>
                        <span class="discounted-price">${product.discountedPrice.toLocaleString('en-IN')}</span>
                    </div>
                </div>
            </div>
        `).join('');
        }

        function handleProductClick(link, productId) {
            if (link) {
                window.location.href = link;
            } else {
                console.log('No link available for product ID:', productId);
            }
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            updateCartBadge();
        });

        // Update cart badge when page becomes visible
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                updateCartBadge();
            }
        });

        // Update cart badge when coming back from another page
        window.addEventListener('focus', updateCartBadge);

        // Update on storage changes (when cart is modified in another tab)
        window.addEventListener('storage', (e) => {
            if (e.key === 'userCarts' || e.key === 'userData') {
                updateCartBadge();
            }
        });
    </script>
</body>

</html>
