<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed!</title>
    <script src="search.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Inter, system-ui;
            background: linear-gradient(135deg, #faf8f6 0%, #f0ebe3 100%);
            color: #421F16;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        .firework {
            position: fixed;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            animation: firework 1.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes firework {
            0% {
                transform: translate(0, 0);
                opacity: 1;
            }
            100% {
                transform: translate(var(--x), var(--y));
                opacity: 0;
            }
        }

        .particle {
            position: fixed;
            width: 8px;
            height: 8px;
            background: linear-gradient(135deg, #8B4513, #D2691E);
            border-radius: 50%;
            animation: float 3s ease-in-out infinite;
            opacity: 0.6;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(180deg);
            }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            animation: confetti-fall 3s linear forwards;
            pointer-events: none;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .confirmation-container {
            background: white;
            border-radius: 24px;
            padding: 3rem 2rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(66, 31, 22, 0.2);
            text-align: center;
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            z-index: 10;
        }

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3) rotate(-10deg);
            }
            50% {
                transform: scale(1.05) rotate(5deg);
            }
            70% {
                transform: scale(0.9) rotate(-2deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        .success-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, #4CAF50, #45A049);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: rotateScale 1s ease 0.3s both, pulse 2s ease-in-out 1.3s infinite;
            position: relative;
        }

        @keyframes rotateScale {
            0% {
                transform: scale(0) rotate(-180deg);
                opacity: 0;
            }
            50% {
                transform: scale(1.2) rotate(20deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 0 20px rgba(76, 175, 80, 0);
            }
        }

        .checkmark {
            width: 60px;
            height: 60px;
            border: 5px solid white;
            border-radius: 50%;
            position: relative;
        }

        .checkmark::after {
            content: '';
            position: absolute;
            left: 18px;
            top: 8px;
            width: 15px;
            height: 30px;
            border: solid white;
            border-width: 0 5px 5px 0;
            transform: rotate(45deg);
            animation: checkDraw 0.5s ease 0.8s both;
        }

        @keyframes checkDraw {
            0% {
                height: 0;
                width: 0;
            }
            50% {
                height: 30px;
                width: 0;
            }
            100% {
                height: 30px;
                width: 15px;
            }
        }

        .success-icon::before,
        .success-icon::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            border: 3px solid #4CAF50;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: ripple 2s ease-out infinite;
        }

        .success-icon::after {
            animation-delay: 1s;
        }

        @keyframes ripple {
            0% {
                width: 100%;
                height: 100%;
                opacity: 1;
            }
            100% {
                width: 200%;
                height: 200%;
                opacity: 0;
            }
        }

        h1 {
            font-size: 2.5rem;
            color: #421F16;
            margin-bottom: 1rem;
            animation: slideInFromTop 0.6s ease 1s both;
        }

        @keyframes slideInFromTop {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .order-id {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 2rem;
            animation: fadeInScale 0.6s ease 1.2s both;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .order-details {
            background: linear-gradient(135deg, #F8F8F8, #FFFFFF);
            border-radius: 16px;
            padding: 2rem 1.5rem;
            margin: 2rem 0;
            text-align: left;
            animation: slideInFromBottom 0.6s ease 1.4s both;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        @keyframes slideInFromBottom {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #E0E0E0;
            animation: slideInLeft 0.4s ease both;
            gap: 1rem;
        }

        .detail-row:nth-child(1) { animation-delay: 1.6s; }
        .detail-row:nth-child(2) { animation-delay: 1.7s; }
        .detail-row:nth-child(3) { animation-delay: 1.8s; }
        .detail-row:nth-child(4) { animation-delay: 1.9s; }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .detail-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .detail-label {
            color: #666;
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
        }

        .detail-value {
            color: #421F16;
            font-weight: 700;
            font-size: 0.95rem;
            text-align: right;
            word-break: break-word;
        }

        .total-amount {
            font-size: 1.8rem;
            color: #8B4513;
            animation: numberCount 1s ease 2s both;
        }

        @keyframes numberCount {
            from {
                opacity: 0;
                transform: scale(1.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .delivery-info {
            background: linear-gradient(135deg, #E8F5E9, #C8E6C9);
            padding: 1.5rem;
            border-radius: 12px;
            margin-top: 2rem;
            border-left: 4px solid #4CAF50;
            animation: slideInRight 0.6s ease 2.1s both;
            font-size: 0.95rem;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
            animation: fadeInScale 0.6s ease 2.3s both;
        }

        .btn {
            padding: 1.25rem 0.75rem;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8B4513, #D2691E);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #8B4513;
            border: 2px solid #8B4513;
        }

        .btn-secondary:hover {
            background: #8B4513;
            color: white;
        }

        .btn span {
            position: relative;
            z-index: 1;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 1.5rem 0.75rem;
            }

            .confirmation-container {
                padding: 2.5rem 1.5rem;
            }

            h1 {
                font-size: 2rem;
            }

            .success-icon {
                width: 100px;
                height: 100px;
            }

            .checkmark {
                width: 50px;
                height: 50px;
                border-width: 4px;
            }

            .checkmark::after {
                left: 15px;
                top: 6px;
                width: 12px;
                height: 25px;
                border-width: 0 4px 4px 0;
            }

            .order-details {
                padding: 1.5rem 1.25rem;
            }

            .detail-label,
            .detail-value {
                font-size: 0.9rem;
            }

            .total-amount {
                font-size: 1.5rem;
            }

            .delivery-info {
                padding: 1.25rem;
                font-size: 0.9rem;
            }

            .btn {
                font-size: 1rem;
                padding: 1.1rem 0.6rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem 0.5rem;
            }

            .confirmation-container {
                padding: 2rem 1.25rem;
                border-radius: 20px;
            }

            h1 {
                font-size: 1.75rem;
            }

            .order-id {
                font-size: 1.1rem;
                margin-bottom: 1.5rem;
            }

            .success-icon {
                width: 90px;
                height: 90px;
                margin-bottom: 1.5rem;
            }

            .checkmark {
                width: 45px;
                height: 45px;
            }

            .checkmark::after {
                left: 13px;
                top: 5px;
                width: 11px;
                height: 22px;
            }

            .order-details {
                padding: 1.25rem 1rem;
                margin: 1.5rem 0;
            }

            .detail-row {
                margin-bottom: 0.85rem;
                padding-bottom: 0.85rem;
            }

            .detail-label,
            .detail-value {
                font-size: 0.85rem;
            }

            .total-amount {
                font-size: 1.4rem;
            }

            .delivery-info {
                padding: 1.1rem;
                font-size: 0.85rem;
                margin-top: 1.5rem;
            }

            .action-buttons {
                grid-template-columns: 1fr;
                margin-top: 1.5rem;
            }

            .btn {
                padding: 1rem;
                font-size: 0.95rem;
            }
        }

        @media (max-width: 360px) {
            body {
                padding: 0.75rem 0.4rem;
            }

            .confirmation-container {
                padding: 1.5rem 1rem;
                border-radius: 16px;
            }

            h1 {
                font-size: 1.5rem;
                margin-bottom: 0.75rem;
            }

            .order-id {
                font-size: 1rem;
                margin-bottom: 1.25rem;
            }

            .success-icon {
                width: 80px;
                height: 80px;
                margin-bottom: 1.25rem;
            }

            .checkmark {
                width: 40px;
                height: 40px;
                border-width: 3px;
            }

            .checkmark::after {
                left: 11px;
                top: 4px;
                width: 10px;
                height: 20px;
                border-width: 0 3px 3px 0;
            }

            .order-details {
                padding: 1rem 0.85rem;
                margin: 1.25rem 0;
                border-radius: 12px;
            }

            .detail-row {
                margin-bottom: 0.75rem;
                padding-bottom: 0.75rem;
                gap: 0.75rem;
            }

            .detail-label,
            .detail-value {
                font-size: 0.8rem;
            }

            .total-amount {
                font-size: 1.3rem;
            }

            .delivery-info {
                padding: 1rem 0.85rem;
                font-size: 0.8rem;
                margin-top: 1.25rem;
                border-radius: 10px;
            }

            .action-buttons {
                margin-top: 1.25rem;
                gap: 0.75rem;
            }

            .btn {
                padding: 0.9rem;
                font-size: 0.9rem;
                border-radius: 10px;
            }
        }
    </style>
<script>
   (function(){var t=document.title;if(!t.startsWith('Build - ')){document.title='Build - '+t;}})();
   </script>
   </head>
<body>
    <div class="confirmation-container">
        <div class="success-icon">
            <div class="checkmark"></div>
        </div>

        <h1>🎉 Order Confirmed!</h1>
        <div class="order-id">Order ID: <strong id="orderId">#ORD12345</strong></div>

        <div class="order-details">
            <div class="detail-row">
                <span class="detail-label">📦 Items</span>
                <span class="detail-value" id="itemCount">0 items</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">💳 Payment Method</span>
                <span class="detail-value" id="paymentMethod">UPI</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">📍 Delivery Address</span>
                <span class="detail-value" id="deliveryAddress">Loading...</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">💰 Total Amount</span>
                <span class="detail-value total-amount" id="totalAmount">₹0</span>
            </div>
        </div>

        <div class="delivery-info">
            <strong>🚚 Estimated Delivery:</strong> 3-5 business days
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" onclick="window.location.href='account.html'">
                <span>View Orders</span>
            </button>
            <button class="btn btn-secondary" onclick="window.location.href='homepage.html'">
                <span>Continue Shopping</span>
            </button>
        </div>
    </div>

    <script>
        function createFireworks() {
            const colors = ['#8B4513', '#D2691E', '#4CAF50', '#FFA500', '#FF6B6B'];
            
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const centerX = Math.random() * window.innerWidth;
                    const centerY = Math.random() * (window.innerHeight / 2);
                    
                    for (let j = 0; j < 30; j++) {
                        const firework = document.createElement('div');
                        firework.className = 'firework';
                        firework.style.left = centerX + 'px';
                        firework.style.top = centerY + 'px';
                        firework.style.background = colors[Math.floor(Math.random() * colors.length)];
                        
                        const angle = (Math.PI * 2 * j) / 30;
                        const velocity = 100 + Math.random() * 100;
                        firework.style.setProperty('--x', Math.cos(angle) * velocity + 'px');
                        firework.style.setProperty('--y', Math.sin(angle) * velocity + 'px');
                        
                        document.body.appendChild(firework);
                        setTimeout(() => firework.remove(), 1500);
                    }
                }, i * 800);
            }
        }

        function createFloatingParticles() {
            const colors = ['#8B4513', '#D2691E', '#4CAF50'];
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = Math.random() * window.innerWidth + 'px';
                    particle.style.top = Math.random() * window.innerHeight + 'px';
                    particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                    particle.style.animationDelay = Math.random() * 2 + 's';
                    particle.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    
                    document.body.appendChild(particle);
                    setTimeout(() => particle.remove(), 5000);
                }, i * 100);
            }
        }

        function createConfetti() {
            const colors = ['#8B4513', '#D2691E', '#4CAF50', '#FFA500', '#FF6B6B'];
            const shapes = ['▀', '▄', '■', '●', '★'];
            
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.textContent = shapes[Math.floor(Math.random() * shapes.length)];
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.color = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.fontSize = (Math.random() * 15 + 10) + 'px';
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    confetti.style.animationDelay = Math.random() * 0.5 + 's';
                    
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 3000);
                }, i * 30);
            }
        }

        function processOrder() {
            const buyNowItem = JSON.parse(localStorage.getItem('buyNowItem'));
            const checkoutItems = JSON.parse(localStorage.getItem('checkoutItems'));
            const addressIndex = localStorage.getItem('selectedAddressIndex');
            const paymentMethod = localStorage.getItem('paymentMethod');
            const paymentDetails = JSON.parse(localStorage.getItem('paymentDetails') || '{}');
            const addresses = JSON.parse(localStorage.getItem('addresses')) || [];
            
            const userData = JSON.parse(localStorage.getItem('userData')) || {};
            const userId = userData.id || 'guest_' + Date.now();

            if (!addressIndex || !paymentMethod) {
                alert('Order data missing. Redirecting to homepage...');
                window.location.href = 'homepage.html';
                return;
            }

            let items = [];
            let isCartCheckout = false;
            if (buyNowItem) {
                items = [buyNowItem];
            } else if (checkoutItems && checkoutItems.length > 0) {
                items = checkoutItems;
                isCartCheckout = true;
            } else {
                alert('No items found. Redirecting to homepage...');
                window.location.href = 'homepage.html';
                return;
            }

            const selectedAddr = addresses[addressIndex];
            if (!selectedAddr) {
                alert('Address not found. Redirecting to homepage...');
                window.location.href = 'homepage.html';
                return;
            }

            const itemTotal = items.reduce((sum, item) => sum + (item.originalPrice * item.quantity), 0);
            const subtotal = items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const discount = itemTotal - subtotal;
            const delivery = subtotal > 20000 ? 0 : 500;
            const codCharge = paymentMethod === 'cod' ? 50 : 0;
            const total = subtotal + delivery + codCharge;

            const orderId = 'ORD' + Math.floor(10000 + Math.random() * 90000);

            const order = {
                userId: userId,
                orderId: orderId,
                date: new Date().toISOString(),
                status: 'Processing',
                items: items,
                address: selectedAddr,
                paymentMethod: paymentMethod.toUpperCase(),
                paymentDetails: paymentDetails,
                itemTotal: itemTotal,
                discount: discount,
                delivery: delivery,
                codCharge: codCharge,
                total: total
            };

            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            orders.unshift(order);
            localStorage.setItem('orders', JSON.stringify(orders));

            document.getElementById('orderId').textContent = '#' + orderId;
            document.getElementById('itemCount').textContent = items.length + ' item' + (items.length > 1 ? 's' : '');
            document.getElementById('paymentMethod').textContent = paymentMethod.toUpperCase();
            document.getElementById('deliveryAddress').textContent = `${selectedAddr.city}, ${selectedAddr.state}`;
            document.getElementById('totalAmount').textContent = '₹' + total;

            if (isCartCheckout) {
                localStorage.removeItem('cart');
                localStorage.removeItem('checkoutItems');
            } else {
                localStorage.removeItem('buyNowItem');
            }
            localStorage.removeItem('selectedAddressIndex');
            localStorage.removeItem('paymentMethod');
            localStorage.removeItem('paymentDetails');

            createConfetti();
            createFireworks();
            createFloatingParticles();
        }

        window.onload = processOrder;
    </script>
</body>
</html>
