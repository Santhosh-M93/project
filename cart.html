<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="search.js"></script>
    <title>Shopping Cart</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Inter, system-ui;
            background: #faf8f6;
            color: #421F16;
        }

        .header {
            background: #421F16;
            color: #F3ECDC;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 12px rgba(66, 31, 22, 0.3);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #F3ECDC;
        }

        .logo-image {
            width: 180px;
            height: 50px;
            object-fit: contain;
            border-radius: 15px;
        }

        .search-container {
            flex: 1;
            max-width: 600px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 3rem 0.75rem 1rem;
            border: 2px solid #F3ECDC;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            background: #F3ECDC;
            color: #421F16;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: #8B4513;
            box-shadow: 0 0 0 3px rgba(139, 69, 19, 0.1);
        }

        .search-btn {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            color: #421F16;
        }

        .search-btn svg {
            width: 20px;
            height: 20px;
        }

        .header-icons {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .become-seller-btn {
            background: #8B4513;
            color: #F3ECDC;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .become-seller-btn:hover {
            background: #A0522D;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 69, 19, 0.3);
        }

        .become-seller-btn svg {
            width: 18px;
            height: 18px;
        }

        .icon-btn {
            background: rgba(243, 236, 220, 0.2);
            border: 2px solid #F3ECDC;
            color: #F3ECDC;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
        }

        .icon-btn:hover {
            background: rgba(243, 236, 220, 0.3);
            transform: translateY(-2px);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #D2691E;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid #421F16;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .page-title {
            font-size: 2.5rem;
            color: #421F16;
            margin: 2rem 0;
        }

        .cart-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .cart-items {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(66, 31, 22, 0.1);
        }

        .cart-item {
            display: grid;
            grid-template-columns: 120px 1fr auto;
            gap: 1.5rem;
            padding: 1.5rem 0;
            border-bottom: 2px solid #F3ECDC;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item-image {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-item-details h3 {
            color: #421F16;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .cart-item-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #421F16;
            margin: 0.5rem 0;
        }

        .cart-item-original-price {
            text-decoration: line-through;
            color: #999;
            margin-left: 0.5rem;
            font-size: 1rem;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1rem 0;
        }

        .qty-control-btn {
            width: 35px;
            height: 35px;
            border: 2px solid #8B4513;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .qty-control-btn:hover {
            background: #8B4513;
            color: white;
        }

        .qty-display {
            font-size: 1.1rem;
            font-weight: 600;
            min-width: 40px;
            text-align: center;
        }

        .remove-btn {
            color: #D2691E;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            text-decoration: underline;
        }

        .cart-summary {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(66, 31, 22, 0.1);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 1.05rem;
        }

        .summary-row.total {
            font-size: 1.5rem;
            font-weight: bold;
            color: #421F16;
            padding-top: 1rem;
            border-top: 2px solid #F3ECDC;
            margin-top: 1rem;
        }

        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background: #8B4513;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .checkout-btn:hover {
            background: #A0522D;
            transform: translateY(-2px);
        }

        .empty-cart {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(66, 31, 22, 0.1);
            grid-column: 1 / -1;
        }

        .empty-cart-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            color: #D2691E;
        }

        .promo-section {
            background: #F3ECDC;
            padding: 1rem;
            border-radius: 8px;
            margin: 1.5rem 0;
        }

        .promo-input {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .promo-input input {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid #421F16;
            border-radius: 6px;
            outline: none;
        }

        .promo-input button {
            padding: 0.75rem 1.5rem;
            background: #421F16;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .savings-text {
            color: #4CAF50;
            font-weight: 600;
            font-size: 0.9rem;
            margin: 0.5rem 0;
        }

        .unit-text {
            font-size: 0.9rem;
            color: #666;
        }

        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .login-modal.active {
            display: flex;
        }

        .login-modal-content {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .login-modal-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .login-modal h2 {
            color: #421F16;
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }

        .login-modal p {
            color: #666;
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .login-modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .login-modal-btn {
            padding: 0.9rem 2rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .login-modal-btn.primary {
            background: linear-gradient(135deg, #8B4513, #D2691E);
            color: white;
        }

        .login-modal-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 69, 19, 0.4);
        }

        .login-modal-btn.secondary {
            background: #E0E0E0;
            color: #421F16;
        }

        .login-modal-btn.secondary:hover {
            background: #D0D0D0;
        }

        @media (max-width: 768px) {
            .login-modal-content {
                padding: 2rem 1.5rem;
            }

            .login-modal h2 {
                font-size: 1.5rem;
            }

            .login-modal p {
                font-size: 0.9rem;
            }

            .login-modal-buttons {
                flex-direction: column;
            }

            .login-modal-btn {
                width: 100%;
            }
        }

        /* Tablet - 1024px */
        @media (max-width: 1024px) {
            .logo-image {
                width: 150px;
                height: 42px;
                border-radius: 12px;
                /* 30% of 42px = 12.6px, rounded to 12px */
            }

            .search-container {
                max-width: 500px;
            }

            .become-seller-btn {
                padding: 0.65rem 1.2rem;
                font-size: 0.95rem;
            }

            .page-title {
                font-size: 2rem;
            }

            .cart-container {
                gap: 1.5rem;
            }

            .cart-items {
                padding: 1.5rem;
            }

            .cart-summary {
                padding: 1.5rem;
            }
        }

        /* Tablet Portrait - 768px */
        @media (max-width: 768px) {
            .header-container {
                gap: 0.75rem;
            }

            .search-container {
                order: 3;
                width: 100%;
                max-width: 100%;
            }

            .page-title {
                font-size: 1.75rem;
                margin: 1.5rem 0;
            }

            .cart-container {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .cart-summary {
                position: static;
            }

            .cart-items {
                padding: 1.25rem;
            }

            .cart-item {
                grid-template-columns: 100px 1fr;
                gap: 1rem;
            }

            .cart-item-image {
                width: 100px;
                height: 100px;
            }

            .cart-item-details h3 {
                font-size: 1.1rem;
            }

            .cart-item-price {
                font-size: 1.3rem;
            }

            .empty-cart {
                padding: 3rem 1.5rem;
            }

            .empty-cart-icon {
                font-size: 4rem;
            }
        }

        /* Mobile Large - 480px */
        @media (max-width: 480px) {
            .header {
                padding: 0.75rem 0;
            }

            .header-container {
                gap: 0.5rem;
                padding: 0 0.5rem;
            }

            .logo-image {
                width: 100px;
                height: 30px;
                border-radius: 9px;
            }

            .become-seller-btn span {
                display: none;
            }

            .become-seller-btn {
                padding: 0.5rem;
                width: 40px;
                height: 40px;
                justify-content: center;
                gap: 0;
            }

            .icon-btn {
                width: 36px;
                height: 36px;
            }

            .icon-btn svg {
                width: 18px;
                height: 18px;
            }

            .search-input {
                padding: 0.65rem 2.5rem 0.65rem 0.75rem;
                font-size: 0.9rem;
            }

            .container {
                padding: 0 0.75rem;
            }

            .page-title {
                font-size: 1.5rem;
                margin: 1rem 0;
            }

            .cart-container {
                gap: 1rem;
                margin-top: 1rem;
            }

            .cart-items {
                padding: 1rem;
                border-radius: 8px;
            }

            .cart-item {
                grid-template-columns: 80px 1fr;
                gap: 0.75rem;
                padding: 1rem 0;
            }

            .cart-item-image {
                width: 80px;
                height: 80px;
            }

            .cart-item-details h3 {
                font-size: 1rem;
            }

            .cart-item-price {
                font-size: 1.2rem;
            }

            .cart-item-original-price {
                font-size: 0.9rem;
            }

            .quantity-controls {
                gap: 0.75rem;
                margin: 0.75rem 0;
            }

            .qty-control-btn {
                width: 32px;
                height: 32px;
                font-size: 1.1rem;
            }

            .qty-display {
                font-size: 1rem;
                min-width: 35px;
            }

            .savings-text {
                font-size: 0.85rem;
            }

            .unit-text {
                font-size: 0.85rem;
            }

            .cart-summary {
                padding: 1.25rem;
                border-radius: 8px;
            }

            .cart-summary h2 {
                font-size: 1.3rem;
            }

            .promo-section {
                padding: 0.85rem;
            }

            .promo-input {
                flex-direction: column;
                gap: 0.5rem;
            }

            .promo-input input {
                padding: 0.65rem;
            }

            .promo-input button {
                padding: 0.65rem 1rem;
                width: 100%;
            }

            .summary-row {
                font-size: 0.95rem;
            }

            .summary-row.total {
                font-size: 1.3rem;
            }

            .checkout-btn {
                padding: 0.85rem;
                font-size: 1rem;
            }

            .empty-cart {
                padding: 2.5rem 1rem;
            }

            .empty-cart-icon {

            }
        }

        /* Mobile Small - 360px */
        @media (max-width: 360px) {
            .logo-image {
                width: 80px;
                height: 24px;
                border-radius: 7px;
            }

            .header-container {
                padding: 0 0.35rem;
            }

            .icon-btn {
                width: 32px;
                height: 32px;
            }

            .become-seller-btn {
                width: 32px;
                height: 32px;
                padding: 0.35rem;
            }

            .cart-badge {
                width: 16px;
                height: 16px;
                font-size: 0.65rem;
                top: -6px;

            }

            .search-input {
                font-size: 0.85rem;
                padding: 0.55rem 2.25rem 0.55rem 0.65rem;
            }

                font-size: 1.3rem;

                padding: 0.85rem;

                gap: 0.65rem;
                padding: 0.85rem 0;
            }

                width: 70px;

            }

                font-size: 0.95rem;
                margin-bottom: 0.35rem;
            }

            .cart-item-price {
                font-size: 1.1rem;
                margin: 0.35rem 0;
            }

            .cart-item-original-price {
                font-size: 0.85rem;
                margin-left: 0.35rem;
            }

            .quantity-controls {
                gap: 0.65rem;
                margin: 0.65rem 0;
            }

            .qty-control-btn {

                height: 30px;

            }

            .qty-display {
                font-size: 0.95rem;
                min-width: 30px;
            }

            .remove-btn {
                font-size: 0.9rem;
            }

<body>
    <!-- Login Required Modal -->
    <div class="login-modal" id="loginModal">
        <div class="login-modal-content">
            <div class="login-modal-icon">🛒</div>
            <h2>Login Required</h2>
            <p>Please login to view your cart and continue shopping.</p>
            <div class="login-modal-buttons">
                <button class="login-modal-btn primary" onclick="redirectToLogin()">Login Now</button>
                <button class="login-modal-btn secondary" onclick="goToHomepage()">Go to Homepage</button>
            </div>
        </div>
    </div>
    <header class="header">
        <div class="header-container">
            <a href="homepage.html" class="logo">
                <!-- Replace with your logo filename -->
                <img src="WhatsApp Image 2025-12-08 at 7.55.57 PM.jpeg" alt="Logo" class="logo-image">
            </a>

            <div class="search-container">
                <input type="text" class="search-input" placeholder="Search for products..." id="searchInput">
                <button class="search-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
            </div>

            <div class="header-icons">
                <button class="become-seller-btn" onclick="window.location.href='become-seller.html'">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 7h-9"></path>
                        <path d="M14 17H5"></path>
                        <circle cx="17" cy="17" r="3"></circle>
                        <circle cx="7" cy="7" r="3"></circle>
                    </svg>
                    <span>Become Seller</span>
                </button>
                <a href="account.html" class="icon-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </a>
                <a href="cart.html" class="icon-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-badge">0</span>
                </a>

            </div>
        </div>
    </header>

    <main class="container">
        <h1 class="page-title">Shopping Cart</h1>
        <div class="cart-container" id="cartContainer"></div>
    </main>

    <script>

        function getCurrentUserId() {
            const userData = JSON.parse(localStorage.getItem('userData'));
            return userData ? userData.id : null;
        }

        function getUserCart(userId) {
            if (!userId) return [];

            const allCarts = JSON.parse(localStorage.getItem('userCarts')) || {};
            return allCarts[userId] || [];
        }

        function saveUserCart(userId, cart) {
            if (!userId) return;

            const allCarts = JSON.parse(localStorage.getItem('userCarts')) || {};
            allCarts[userId] = cart;
            localStorage.setItem('userCarts', JSON.stringify(allCarts));
        }

        function migrateGlobalCartToUser() {
            const userId = getCurrentUserId();
            if (!userId) return;

            // Check if there's an old global cart
            const globalCart = JSON.parse(localStorage.getItem('cart'));
            if (globalCart && globalCart.length > 0) {
                // Check if user already has a cart
                const userCart = getUserCart(userId);
                if (userCart.length === 0) {
                    // Migrate global cart to this user
                    saveUserCart(userId, globalCart);
                }
                // Clear global cart
                localStorage.removeItem('cart');
            }
        }

        function checkLoginStatus() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const loginTime = localStorage.getItem('loginTime');

            if (isLoggedIn === 'true' && loginTime) {
                const currentTime = new Date().getTime();
                const timeDiff = currentTime - parseInt(loginTime);
                const hoursDiff = timeDiff / (1000 * 60 * 60);

                if (hoursDiff < 24) {
                    return true;
                } else {
                    // Session expired
                    localStorage.removeItem('isLoggedIn');
                    localStorage.removeItem('loginTime');
                    localStorage.removeItem('userData');
                    return false;
                }
            }
            return false;
        }

        function redirectToLogin() {
            sessionStorage.setItem('redirectAfterLogin', 'cart.html');
            window.location.href = 'login.html';
        }

        function goToHomepage() {
            window.location.href = 'homepage.html';
        }

        function showLoginPrompt() {
            document.getElementById('loginModal').classList.add('active');
        }

        function updateCartBadge() {
            const userId = getCurrentUserId();
            if (!userId) {
                const badge = document.querySelector(".cart-badge");
                if (badge) badge.textContent = '0';
                return;
            }

            const cart = getUserCart(userId);
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const badge = document.querySelector(".cart-badge");
            if (badge) badge.textContent = totalItems;
        }

        function updateQuantity(index, change) {
            const userId = getCurrentUserId();
            if (!userId) return;

            let cart = getUserCart(userId);
            if (cart[index]) {
                cart[index].quantity += change;
                if (cart[index].quantity <= 0) {
                    cart.splice(index, 1);
                }
                saveUserCart(userId, cart);
                loadCart();
                updateCartBadge();
            }
        }

        function removeItem(index) {
            const userId = getCurrentUserId();
            if (!userId) return;

            let cart = getUserCart(userId);
            cart.splice(index, 1);
            saveUserCart(userId, cart);
            loadCart();
            updateCartBadge();
        }

        let appliedPromo = null;
        const promoCodes = { "WELCOME10": 10, "BUILD20": 20, "FREESHIP": 500 };

        function applyPromo() {
            const code = document.getElementById("promoCode").value.trim().toUpperCase();
            const promoMsg = document.getElementById("promoMessage");
            if (promoCodes[code]) {
                appliedPromo = code;
                promoMsg.style.color = "green";
                promoMsg.textContent = `Promo applied successfully: ${code}`;
            } else {
                appliedPromo = null;
                promoMsg.style.color = "red";
                promoMsg.textContent = "Invalid Promo Code";
            }
            loadCart();
        }

        function proceedToCheckout() {
            const isLoggedIn = checkLoginStatus();
            const userId = getCurrentUserId();

            if (!isLoggedIn || !userId) {
                showLoginPrompt();
                return;
            }

            const cart = getUserCart(userId);
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }

            localStorage.setItem('checkoutItems', JSON.stringify(cart));
            localStorage.removeItem('buyNowItem');
            window.location.href = 'buynow.html';
        }

        // Replace the loadCart() function in your cart.html with this updated version

        function loadCart() {
            const userId = getCurrentUserId();
            if (!userId) {
                const cartContainer = document.getElementById("cartContainer");
                cartContainer.innerHTML = `
            <div class="empty-cart">
                <div class="empty-cart-icon">🛒</div>
                <h2>Please login to view your cart</h2>
                <p>Login to see your saved items</p>
                <button onclick="redirectToLogin()" style="background:#8B4513;color:white;padding:1rem 2rem;border-radius:8px;border:none;font-weight:600;display:inline-block;margin-top:1rem;cursor:pointer;">Login Now</button>
            </div>
        `;
                return;
            }

            const cart = getUserCart(userId);
            const cartContainer = document.getElementById("cartContainer");

            if (cart.length === 0) {
                cartContainer.innerHTML = `
            <div class="empty-cart">
                <div class="empty-cart-icon">🛒</div>
                <h2>Your cart is empty</h2>
                <p>Add items to continue</p>
                <a href="homepage.html" style="background:#8B4513;color:white;padding:1rem 2rem;border-radius:8px;text-decoration:none;font-weight:600;display:inline-block;margin-top:1rem;">Start Shopping</a>
            </div>
        `;
                return;
            }

            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const originalTotal = cart.reduce((sum, item) => sum + (item.originalPrice * item.quantity), 0);
            const discount = originalTotal - subtotal;

            let promoDiscount = 0;
            if (appliedPromo && promoCodes[appliedPromo]) {
                if (appliedPromo === "FREESHIP") {
                    promoDiscount = 500;
                } else {
                    promoDiscount = Math.round(subtotal * (promoCodes[appliedPromo] / 100));
                }
            }

            const delivery = subtotal > 20000 || appliedPromo === "FREESHIP" ? 0 : 500;
            const total = subtotal - promoDiscount + delivery;

            const cartItemsHTML = cart.map((item, index) => `
        <div class="cart-item">
            ${item.link ?
                    `<a href="${item.link}" style="display: contents;">
                    <img src="${item.image}" class="cart-item-image" alt="${item.name}" style="cursor: pointer;">
                </a>`
                    :
                    `<img src="${item.image}" class="cart-item-image" alt="${item.name}">`
                }
            <div class="cart-item-details">
                ${item.link ?
                    `<a href="${item.link}" style="text-decoration: none; color: inherit;">
                        <h3 style="cursor: pointer; transition: color 0.3s;" 
                            onmouseover="this.style.color='#8B4513'" 
                            onmouseout="this.style.color='#421F16'">${item.name}</h3>
                    </a>`
                    :
                    `<h3>${item.name}</h3>`
                }
                <p style="color:#666">${item.description || ""}</p>
                <div class="cart-item-price">₹${item.price}<span class="cart-item-original-price">₹${item.originalPrice}</span></div>
                <div class="savings-text">You save: ₹${(item.originalPrice - item.price) * item.quantity} (${Math.round(((item.originalPrice - item.price) / item.originalPrice) * 100)}% off)</div>
                <div class="unit-text">Unit: ${item.unit || 'each'}</div>
                <div class="quantity-controls">
                    <button class="qty-control-btn" onclick="updateQuantity(${index}, -1)">-</button>
                    <span class="qty-display">${item.quantity}</span>
                    <button class="qty-control-btn" onclick="updateQuantity(${index}, 1)">+</button>
                </div>
                <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
            </div>
        </div>
    `).join("");

            cartContainer.innerHTML = `
        <div class="cart-items">${cartItemsHTML}</div>
        <div class="cart-summary">
            <h2>Order Summary</h2>
            <div class="promo-section">
                <label><b>Have a promo code?</b></label>
                <div class="promo-input">
                    <input id="promoCode" type="text" placeholder="Enter promo code">
                    <button onclick="applyPromo()">Apply</button>
                </div>
                <div id="promoMessage" style="margin-top:6px;font-size:0.9rem;"></div>
            </div>
            <div class="summary-row"><span>Original Price</span><span>₹${originalTotal}</span></div>
            <div class="summary-row"><span>Discount</span><span>- ₹${discount}</span></div>
            <div class="summary-row"><span>Promo Discount</span><span>- ₹${promoDiscount}</span></div>
            <div class="summary-row"><span>Delivery</span><span>${delivery === 0 ? "FREE" : "₹500"}</span></div>
            <div class="summary-row total"><span>Total</span><span>₹${total}</span></div>
            <button class="checkout-btn" onclick="proceedToCheckout()">Proceed to Checkout</button>
            <a href="homepage.html" class="continue-shopping" style="display:block;margin-top:1rem;color:#8B4513;text-decoration:none;font-weight:600;text-align:center;">Continue Shopping</a>
        </div>
    `;
        }

        window.onload = () => {
            const isLoggedIn = checkLoginStatus();

            if (!isLoggedIn) {
                showLoginPrompt();
            } else {
                document.getElementById('loginModal').classList.remove('active');

                // Migrate any existing global cart to user-specific cart
                migrateGlobalCartToUser();

                loadCart();
                updateCartBadge();
            }
        };
    </script>
</body>

</html>
