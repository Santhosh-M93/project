<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Premium Login Experience</title>
  <script src="search.js"></script>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #5a4332 0%, #412f16 50%, #2a1d0f 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    .bg-shapes {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .shape {
      position: absolute;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 50%;
      animation: float 20s infinite ease-in-out;
      max-width: 200px;
      max-height: 200px;
    }

    .shape:nth-child(1) {
      width: 300px;
      height: 300px;
      top: -50px;
      left: -50px;
      animation-delay: 0s;
    }

    .shape:nth-child(2) {
      width: 200px;
      height: 200px;
      bottom: -30px;
      right: 10%;
      animation-delay: 3s;
    }

    .shape:nth-child(3) {
      width: 150px;
      height: 150px;
      top: 40%;
      left: 5%;
      animation-delay: 6s;
    }

    .shape:nth-child(4) {
      width: 250px;
      height: 250px;
      top: 10%;
      right: -80px;
      animation-delay: 2s;
    }

    @keyframes float {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
        opacity: 0.3;
      }

      33% {
        transform: translate(50px, -80px) scale(1.1);
        opacity: 0.5;
      }

      66% {
        transform: translate(-30px, 50px) scale(0.95);
        opacity: 0.4;
      }
    }

    .line {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      animation: moveLine 8s infinite linear;
    }

    .line:nth-child(5) {
      width: 40%;
      top: 20%;
      left: -40%;
      animation-delay: 1s;
    }

    .line:nth-child(6) {
      width: 50%;
      top: 60%;
      right: -50%;
      animation-delay: 4s;
    }

    .line:nth-child(7) {
      width: 30%;
      top: 80%;
      left: -30%;
      animation-delay: 6s;
    }

    @keyframes moveLine {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(200%);
      }
    }

    .container {
      display: flex;
      max-width: 750px;
      width: 90%;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255, 255, 255, 0.1);
      background: #ffffff;
      animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      z-index: 1;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(60px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .form-container {
      flex: 1;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: #ffffff;
      animation: fadeInLeft 1s ease-out 0.3s both;
    }

    @keyframes fadeInLeft {
      from {
        opacity: 0;
        transform: translateX(-40px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .logo {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #412f16 0%, #5a4332 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 1.2rem;
      animation: bounce 2s ease infinite;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-5px);
      }
    }

    .form-container h1 {
      font-size: 2rem;
      color: #412f16;
      margin-bottom: 0.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .subtitle {
      color: #8b7355;
      margin-bottom: 1.8rem;
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.2px;
    }

    .form-group {
      position: relative;
      margin-bottom: 1.3rem;
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      display: block;
      color: #412f16;
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 0.45rem;
      letter-spacing: 0.2px;
    }

    .form-group input {
      width: 100%;
      padding: 0.9rem 1rem;
      border-radius: 12px;
      border: 2px solid #e8e0d8;
      outline: none;
      background-color: #faf8f6;
      font-size: 0.9rem;
      color: #412f16;
      font-family: 'Poppins', sans-serif;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      font-weight: 500;
    }

    .form-group input:focus {
      border-color: #412f16;
      background-color: #ffffff;
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(65, 47, 22, 0.15), 0 0 0 4px rgba(65, 47, 22, 0.05);
    }

    .button-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.3rem;
    }

    .send-code {
      background: #412f16;
      color: white;
      border: none;
      padding: 0.55rem 1rem;
      border-radius: 9px;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 3px 12px rgba(65, 47, 22, 0.3);
      white-space: nowrap;
      margin-top: 5px;
    }

    .send-code:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(65, 47, 22, 0.4);
      background: #5a4332;
    }

    .send-code.sent {
      background: #2d8659;
      animation: pulse 0.6s ease;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }
    }

    .edit-btn {
      display: none;
      background: none;
      border: none;
      color: #412f16;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      padding: 0.35rem 0.6rem;
      align-items: center;
      gap: 0.3rem;
      transition: all 0.3s ease;
    }

    .edit-btn:hover {
      color: #5a4332;
    }

    .edit-btn i {
      font-style: normal;
      font-size: 0.9rem;
    }

    .edit-btn.show {
      display: flex;
    }

    .login-btn {
      width: 100%;
      padding: 1rem;
      background: #412f16;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 8px 30px rgba(65, 47, 22, 0.4);
      margin-top: 0.8rem;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.4px;
    }

    .login-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s ease, height 0.6s ease;
    }

    .login-btn:hover::before {
      width: 400px;
      height: 400px;
    }

    .login-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 45px rgba(65, 47, 22, 0.5);
      background: #5a4332;
    }

    .login-btn span {
      position: relative;
      z-index: 1;
    }

    .info-container {
      flex: 1;
      padding: 2.2rem 1.8rem;
      background: linear-gradient(135deg, #412f16 0%, #5a4332 50%, #6d5142 100%);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: fadeInRight 1s ease-out 0.3s both;
    }

    @keyframes fadeInRight {
      from {
        opacity: 0;
        transform: translateX(40px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .info-container::before {
      content: '';
      position: absolute;
      width: 300%;
      height: 300%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.08) 0%, transparent 60%);
      animation: rotate 25s linear infinite;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    @keyframes rotate {
      from {
        transform: translate(-50%, -50%) rotate(0deg);
      }

      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    .info-content {
      position: relative;
      z-index: 1;
    }

    .info-icon {
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1.2rem;
      animation: iconFloat 3s ease-in-out infinite;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
    }

    @keyframes iconFloat {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    .info-container h2 {
      font-size: 2rem;
      margin-bottom: 0.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .info-tagline {
      font-size: 0.9rem;
      font-weight: 400;
      opacity: 0.95;
      margin-bottom: 1.5rem;
      letter-spacing: 0.2px;
    }

    .feature-list {
      list-style: none;
      margin-top: 1rem;
    }

    .feature-item {
      padding: 0.75rem 1.1rem;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(5px);
      border-radius: 10px;
      margin-bottom: 0.6rem;
      transition: all 0.3s ease;
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    .feature-item:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateX(5px);
    }

    .feature-icon {
      font-size: 1.5rem;
      background: rgba(255, 255, 255, 0.15);
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 9px;
    }

    input:disabled {
      background-color: #f0ebe5;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .error-message {
      position: fixed;
      top: 30px;
      right: 30px;
      background: linear-gradient(135deg, #d63031 0%, #e74c3c 100%);
      color: white;
      padding: 1.2rem 1.8rem;
      border-radius: 16px;
      box-shadow: 0 10px 35px rgba(214, 48, 49, 0.4);
      transform: translateX(500px);
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 1000;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      letter-spacing: 0.3px;
    }

    .error-message.show {
      transform: translateX(0);
      opacity: 1;
    }

    .home-link {
      text-align: center;
      margin-top: 1rem;
    }

    .home-link a {
      color: #8b7355;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
    }

    .home-link a:hover {
      color: #412f16;
      gap: 0.75rem;
    }

    @media(max-width:768px) {
      .container {
        flex-direction: column;
        width: 95%;
        max-width: 420px;
        margin: 1rem;
      }

      .info-container {
        display: none;
      }

      .form-container {
        padding: 2rem 1.5rem;
      }

      .form-container h1 {
        font-size: 1.8rem;
      }

      .subtitle {
        font-size: 0.85rem;
        margin-bottom: 1.5rem;
      }

      .button-row {
        flex-direction: column;
        align-items: stretch;
        gap: 0.5rem;
      }

      .send-code {
        width: 100%;
      }

      .edit-btn {
        justify-content: flex-start;
      }

      .error-message {
        top: 20px;
        right: 20px;
        left: 20px;
        padding: 1rem 1.2rem;
        font-size: 0.9rem;
        transform: translateY(-150px);
        opacity: 0;
      }

      .error-message.show {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @media(max-width:480px) {
      .form-container {
        padding: 1.5rem 1rem;
      }

      .subtitle {
        font-size: 0.8rem;
        margin-bottom: 1rem;
      }

      .send-code {
        font-size: 0.8rem;
        padding: 0.7rem;
      }
    }
  </style>
<script>
   (function(){var t=document.title;if(!t.startsWith('Build - ')){document.title='Build - '+t;}})();
   </script>
   </head>

<body>
  <div class="bg-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>
  </div>

  <div class="error-message" id="errorMsg">
    <span
      style="width: 24px; height: 24px; background: rgba(255, 255, 255, 0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">✕</span>
    <span>Error!</span>
  </div>

  <div class="container">
    <div class="form-container">
      <div class="logo">🔐</div>
      <h1>Welcome Back!</h1>
      <p class="subtitle">Sign in to continue your journey with us</p>

      <form id="login-form">
        <div class="form-group">
          <label for="emailOrMobile">Email or Mobile Number</label>
          <input type="text" id="emailOrMobile" required>
          <div class="button-row">
            <button type="button" class="edit-btn" id="editBtn"><i>🖉</i><span>Edit</span></button>
            <button type="button" class="send-code" id="send-code">Send OTP</button>
          </div>
        </div>

        <div class="form-group">
          <label for="otp">One-Time Password</label>
          <input type="text" id="otp" disabled required maxlength="6" placeholder="Enter 6-digit OTP">
        </div>

        <button type="submit" class="login-btn">
          <span>Login to Account</span>
        </button>
      </form>

      <div class="home-link">
        <a href="homepage.html">
          ← Back to Home
        </a>
      </div>
    </div>

    <div class="info-container">
      <div class="info-content">
        <div class="info-icon">🛍️</div>
        <h2>Login</h2>
        <p class="info-tagline">Access your personalized dashboard</p>
        <ul class="feature-list">
          <li class="feature-item">
            <span class="feature-icon">📦</span>
            <span>Track Your Orders</span>
          </li>
          <li class="feature-item">
            <span class="feature-icon">❤️</span>
            <span>Manage Wishlist</span>
          </li>
          <li class="feature-item">
            <span class="feature-icon">✨</span>
            <span>Personal Recommendations</span>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <script>
    console.log('Redirect URL on page load:', sessionStorage.getItem('redirectAfterLogin'));

    // Then when the form submits, add this just before the redirect logic:
    console.log('Redirect URL before redirect:', sessionStorage.getItem('redirectAfterLogin'));
    // Initialize database if not exists
    if (!localStorage.getItem('usersDB')) {
      localStorage.setItem('usersDB', JSON.stringify({ users: [] }));
    }

    const sendBtn = document.getElementById('send-code');
    const emailInput = document.getElementById('emailOrMobile');
    const otpInput = document.getElementById('otp');
    const editBtn = document.getElementById('editBtn');
    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('errorMsg');

    // Show error message with auto-hide
    function showError(message) {
      errorMsg.querySelector('span:last-child').textContent = message;
      errorMsg.classList.add('show');
      setTimeout(() => {
        errorMsg.classList.remove('show');
      }, 3500);
    }

    // Validation functions
    function validateEmail(email) {
      const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return regex.test(email);
    }

    function validatePhone(phone) {
      const regex = /^\d{10}$/;
      return regex.test(phone);
    }

    // Load users from database
    function loadUsers() {
      const data = JSON.parse(localStorage.getItem('usersDB') || '{"users":[]}');
      return data.users || [];
    }

    // Save users to database
    function saveUsers(users) {
      localStorage.setItem('usersDB', JSON.stringify({ users: users }));
    }

    // Check if user exists
    function findUser(value) {
      const users = loadUsers();
      const isEmail = validateEmail(value);

      if (isEmail) {
        return users.find(user => user.email === value);
      } else {
        return users.find(user => user.phone === value);
      }
    }

    // Send OTP button
    sendBtn.addEventListener('click', () => {
      const value = emailInput.value.trim();

      if (!value) {
        showError('Please enter email or phone number');
        emailInput.focus();
        return;
      }

      if (validateEmail(value) || validatePhone(value)) {
        otpInput.disabled = false;
        sendBtn.classList.add('sent');
        sendBtn.textContent = 'Resend OTP';
        otpInput.focus();
        emailInput.disabled = true;
        editBtn.classList.add('show');
      } else {
        emailInput.focus();
        emailInput.style.borderColor = '#d63031';
        emailInput.style.boxShadow = '0 0 0 4px rgba(214,48,49,0.1)';
        showError('Please enter a valid email or 10-digit phone number');

        setTimeout(() => {
          emailInput.style.borderColor = '#e8e0d8';
          emailInput.style.boxShadow = 'none';
        }, 1500);
      }
    });

    // Edit button
    editBtn.addEventListener('click', () => {
      emailInput.disabled = false;
      emailInput.value = '';
      emailInput.focus();
      editBtn.classList.remove('show');
      sendBtn.classList.remove('sent');
      sendBtn.textContent = 'Send OTP';
      otpInput.disabled = true;
      otpInput.value = '';
    });

    // Only allow numbers in OTP
    otpInput.addEventListener('input', function (e) {
      this.value = this.value.replace(/[^0-9]/g, '');
    });

    // Form submission
    // Add this to the form submission section in login.html
    // Replace the existing form.addEventListener('submit', ...) with this:

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const value = emailInput.value.trim();
      const otpVal = otpInput.value.trim();

      if (!value) {
        showError('Please enter email or phone number');
        return;
      }

      if (!otpVal) {
        showError('Please enter OTP');
        return;
      }

      if (!(validateEmail(value) || validatePhone(value))) {
        showError('Invalid email or phone number');
        return;
      }

      const isEmail = validateEmail(value);
      const isPhone = validatePhone(value);
      const users = loadUsers();

      let existingUser = findUser(value);

      if (existingUser) {
        // Existing user - Update lastLogin
        const userIndex = users.findIndex(u =>
          (isEmail && u.email === value) || (isPhone && u.phone === value)
        );

        if (userIndex !== -1) {
          users[userIndex].lastLogin = new Date().toISOString();
          saveUsers(users);
          existingUser = users[userIndex];
        }

        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('loginTime', new Date().getTime().toString());
        localStorage.setItem('userData', JSON.stringify(existingUser));

        // Check if there's a redirect URL
        const redirectUrl = sessionStorage.getItem('redirectAfterLogin');
        if (redirectUrl) {
          sessionStorage.removeItem('redirectAfterLogin');
          window.location.replace(redirectUrl);
        } else {
          window.location.replace('account.html');
        }
      } else {
        // New user
        const newUser = {
          id: Date.now().toString(),
          phone: isPhone ? value : '',
          email: isEmail ? value : '',
          name: 'User',
          gender: '',
          dob: '',
          memberSince: new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' }),
          registeredAt: new Date().toISOString(),
          lastLogin: new Date().toISOString()
        };

        users.push(newUser);
        saveUsers(users);

        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('loginTime', new Date().getTime().toString());
        localStorage.setItem('userData', JSON.stringify(newUser));

        // Check if there's a redirect URL
        const redirectUrl = sessionStorage.getItem('redirectAfterLogin');
        if (redirectUrl) {
          sessionStorage.removeItem('redirectAfterLogin');
          window.location.replace(redirectUrl);
        } else {
          window.location.replace('account.html');
        }
      }
    });
  </script>
</body>

</html>
